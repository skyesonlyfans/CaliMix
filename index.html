<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaliMix by Skye &lt;3</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#d53369;
--secondary:#cbad6d;
--bg-gradient:linear-gradient(135deg,#1a0b2e 0%,#4a154b 50%,#1e1333 100%);
--glass-bg:rgba(255,255,255,.05);
--glass-border:rgba(255,255,255,.1);
--glass-shadow:0 8px 32px rgba(0,0,0,.37);
--text-main:#fff;
--text-muted:#b3b3b3;
--accent:#ff007f;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Poppins',sans-serif;
user-select:none;
}

body{
background:var(--bg-gradient);
color:var(--text-main);
min-height:100vh;
display:flex;
flex-direction:column;
background-attachment:fixed;
}

/* glass UI */

.glass{
background:var(--glass-bg);
backdrop-filter:blur(12px);
border:1px solid var(--glass-border);
border-radius:16px;
box-shadow:var(--glass-shadow);
}

.glass-btn{
background:rgba(255,255,255,.1);
border:1px solid rgba(255,255,255,.2);
color:white;
padding:10px 20px;
border-radius:50px;
cursor:pointer;
transition:.3s;
font-weight:600;
display:inline-flex;
gap:8px;
align-items:center;
}

.glass-btn:hover:not(:disabled){
background:rgba(255,255,255,.2);
transform:translateY(-2px);
}

.glass-input{
width:100%;
background:rgba(0,0,0,.2);
border:1px solid var(--glass-border);
color:white;
padding:12px 20px;
border-radius:12px;
outline:none;
font-size:16px;
margin-bottom:15px;
}

/* layout */

#app-container{
display:flex;
flex:1;
height:100vh;
overflow:hidden;
}

/* auth */

#auth-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
background:var(--bg-gradient);
}

.auth-card{
padding:40px;
text-align:center;
max-width:400px;
width:90%;
}

/* sidebar */

#sidebar{
width:250px;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
border-right:1px solid var(--glass-border);
}

/* main */

#main-content{
flex:1;
padding:30px;
overflow-y:auto;
padding-bottom:120px;
}

.view{display:none;}
.view.active{display:block;}

/* song grid */

.song-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
margin-top:20px;
}

.song-card{
padding:15px;
border-radius:12px;
cursor:pointer;
transition:.3s;
position:relative;
text-align:center;
}

.song-card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,.08);
}

.song-card img{
width:100%;
aspect-ratio:1;
border-radius:8px;
object-fit:cover;
margin-bottom:10px;
}

/* player */

#player-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:90px;
padding:0 20px;
display:flex;
align-items:center;
justify-content:space-between;
border-top:1px solid var(--glass-border);
transform:translateY(100%);
transition:.3s;
}

#player-bar.visible{
transform:translateY(0);
}
</style>
</head>

<body>

<div id="auth-screen" class="glass">
<div class="auth-card glass">
<h1>CaliMix by Skye &lt;3</h1>
<p>Your personal soundscape.</p>

<button id="btn-login" class="glass-btn">
<span class="material-icons-round">login</span>
Continue with Google
</button>

<button id="btn-guest" class="glass-btn" style="background:transparent;">
Continue as Guest
</button>

</div>
</div>


<div id="app-container" style="display:none;">

<nav id="sidebar" class="glass">
<div class="nav-brand">CaliMix</div>

<div class="nav-item active" data-target="home-view">
<span class="material-icons-round">home</span>
Home
</div>

<div class="nav-item" data-target="search-view">
<span class="material-icons-round">search</span>
Search
</div>

</nav>


<main id="main-content">

<div id="home-view" class="view active">
<h2>Featured Tracks</h2>
<div id="home-song-grid" class="song-grid"></div>
</div>

<div id="search-view" class="view">
<h2>Search</h2>
<input id="search-input" class="glass-input">
<div id="search-song-grid" class="song-grid"></div>
</div>

</main>
</div>


<div id="player-bar" class="glass">
<div>
<h4 id="player-title">No Track Selected</h4>
</div>
</div>



<script type="module">

import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
getAuth,
signInWithPopup,
GoogleAuthProvider,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

import {
S3Client,
ListObjectsV2Command
}
from "https://cdn.jsdelivr.net/npm/@aws-sdk/client-s3@3.525.0/+esm";


/* firebase */

const firebaseConfig={
apiKey:"AIzaSyAsTKPPWmwJPIvcQUrcrtpIchs2fgkCjao",
authDomain:"calimix.firebaseapp.com",
projectId:"calimix"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);


/* BACKBLAZE B2 CONFIG (FIXED) */

const s3Client=new S3Client({
endpoint:"https://s3.us-east-005.backblazeb2.com",
region:"us-east-005",
forcePathStyle:true,
credentials:{
accessKeyId:"0058aaeb5bf587b000000000b",
secretAccessKey:"K005pe+xi32OYTYjigts4sMlFfsgovo"
}
});

const bucketName="calimix";


let globalSongs=[];


/* login */

document.getElementById("btn-login")
.onclick=()=>{

signInWithPopup(auth,new GoogleAuthProvider());

};


document.getElementById("btn-guest")
.onclick=enterApp;


onAuthStateChanged(auth,user=>{
if(user) enterApp();
});


/* enter */

function enterApp(){

document.getElementById("auth-screen").style.display="none";
document.getElementById("app-container").style.display="flex";

fetchSongs();

}


/* FETCH SONGS FROM B2 */

async function fetchSongs(){

try{

const command=new ListObjectsV2Command({
Bucket:bucketName
});

const response=await s3Client.send(command);

globalSongs=(response.Contents||[])
.filter(x=>x.Key.endsWith(".mp3"))
.map(file=>({

title:file.Key.replace(".mp3",""),
artist:"Unknown Artist",
audioUrl:
`https://f005.backblazeb2.com/file/${bucketName}/${encodeURIComponent(file.Key)}`

}));

renderSongs(globalSongs);

}

catch(err){

console.error(err);

document.getElementById("home-song-grid")
.innerHTML="B2 connection failed ❌";

}

}


/* render */

function renderSongs(list){

const container=
document.getElementById("home-song-grid");

container.innerHTML="";

list.forEach(song=>{

const div=document.createElement("div");

div.className="song-card glass";

div.innerHTML=`
<h4>${song.title}</h4>
`;

div.onclick=()=>playTrack(song);

container.appendChild(div);

});

}


/* player */

const audio=new Audio();

function playTrack(song){

audio.src=song.audioUrl;

audio.play();

document.getElementById("player-title")
.innerText=song.title;

document.getElementById("player-bar")
.classList.add("visible");

}

</script>

</body>
</html>
