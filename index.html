<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CaliMix by Skye</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<style>
:root{
--primary:#ff007f;
--secondary:#7f5cff;
--glass:rgba(255,255,255,.06);
--border:rgba(255,255,255,.12);
--text:#ffffff;
--muted:#a7a7a7;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}

body{
background:linear-gradient(135deg,#160a2b,#2b124f,#160a2b);
color:var(--text);
height:100vh;
display:flex;
overflow:hidden
}

.sidebar{
width:260px;
backdrop-filter:blur(18px);
background:var(--glass);
border-right:1px solid var(--border);
padding:24px;
display:flex;
flex-direction:column
}

.brand{
font-size:28px;
font-weight:800;
margin-bottom:32px;
background:linear-gradient(90deg,#fff,var(--primary));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}

.navItem{
padding:14px 18px;
border-radius:12px;
margin-bottom:8px;
cursor:pointer;
color:var(--muted);
display:flex;
align-items:center;
gap:10px
}

.navItem:hover{background:rgba(255,255,255,.12);color:white}

.main{
flex:1;
display:flex;
flex-direction:column
}

.header{
padding:24px;
font-size:22px;
font-weight:600
}

.library{
flex:1;
overflow-y:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px
}

.track{
padding:16px;
background:var(--glass);
border:1px solid var(--border);
border-radius:16px;
cursor:pointer;
transition:.25s
}

.track:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.1)
}

.trackTitle{
font-weight:600;
margin-bottom:6px
}

.player{
height:90px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(20px);
display:flex;
align-items:center;
padding:0 30px;
justify-content:space-between
}

.controls{
display:flex;
align-items:center;
gap:18px
}

.material-icons-round{
cursor:pointer;font-size:32px}

.progress{
flex:1;
margin:0 20px
}

input[type=range]{width:100%}

</style>
</head>
<body>

<div class="sidebar">
<div class="brand">CaliMix</div>
<div class="navItem"><span class="material-icons-round">library_music</span> Library</div>
</div>

<div class="main">
<div class="header">Streaming from Backblaze B2</div>
<div id="library" class="library"></div>

<div class="player">
<div class="controls">
<span id="playBtn" class="material-icons-round">play_circle</span>
<span id="pauseBtn" class="material-icons-round">pause_circle</span>
</div>

<div class="progress">
<input id="seek" type="range" min="0" max="100" value="0">
</div>

<div id="nowPlaying">Nothing playing</div>
</div>
</div>

<audio id="audio"></audio>

<script>

/* CONFIG */

const BUCKET_NAME="calimix";
const ENDPOINT="https://s3.us-east-005.backblazeb2.com";

/* DO NOT expose application keys in frontend */
/* bucket must be public */

const audio=document.getElementById("audio");
const library=document.getElementById("library");
const playBtn=document.getElementById("playBtn");
const pauseBtn=document.getElementById("pauseBtn");
const seek=document.getElementById("seek");
const nowPlaying=document.getElementById("nowPlaying");

let tracks=[];

async function loadTracks(){

try{

const res=await fetch(`${ENDPOINT}/${BUCKET_NAME}?list-type=2`);

const text=await res.text();

const parser=new DOMParser();
const xml=parser.parseFromString(text,"text/xml");

const keys=[...xml.getElementsByTagName("Key")]
.map(el=>el.textContent)
.filter(name=>name.endsWith(".mp3"));

tracks=keys.map(name=>({
name,
url:`${ENDPOINT}/${BUCKET_NAME}/${name}`
}));

renderLibrary();

}catch(err){
console.error(err);
library.innerHTML="Failed loading bucket list. Make bucket public.";
}
}

function renderLibrary(){

library.innerHTML="";

tracks.forEach(track=>{

const card=document.createElement("div");
card.className="track";

card.innerHTML=`
<div class="trackTitle">${track.name}</div>
<div class="trackMeta">MP3 Audio</div>
`;

card.onclick=()=>playTrack(track);

library.appendChild(card);

});

}

function playTrack(track){

 audio.src=track.url;
 audio.play();
 nowPlaying.textContent=track.name;

}

playBtn.onclick=()=>audio.play();
pauseBtn.onclick=()=>audio.pause();

seek.oninput=e=>{

if(audio.duration){
 audio.currentTime=(audio.duration*e.target.value)/100;
}

};

audio.ontimeupdate=()=>{

if(audio.duration){
 seek.value=(audio.currentTime/audio.duration)*100;
}

};

loadTracks();

</script>
</body>
</html>
